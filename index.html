<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bagong Lupa - A New Life on a New World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    body {
      touch-action: none;
    }
    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0a1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      font-size: 64px;
      font-weight: 900;
      color: #FCD116;
      text-shadow: 0 0 30px rgba(252, 209, 22, 0.8), 0 0 60px rgba(252, 209, 22, 0.4);
      letter-spacing: 8px;
      margin-bottom: 8px;
    }
    .loading-subtitle {
      font-size: 18px;
      font-weight: 300;
      color: #87CEEB;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .loading-tagline {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }
    .loading-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #FCD116, #CE1126);
      border-radius: 2px;
      animation: loadingAnim 2s ease-in-out infinite;
    }
    @keyframes loadingAnim {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    .loading-text {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }
    .two-moons {
      position: absolute;
      top: 60px;
      right: 120px;
    }
    .moon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff9c4, #ffd54f);
      box-shadow: 0 0 20px rgba(255, 213, 79, 0.6);
      position: absolute;
    }
    .moon-1 { top: 0; right: 0; }
    .moon-2 { top: 25px; right: 50px; width: 28px; height: 28px; opacity: 0.8; }

    #hud-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 100;
      display: none;
    }
    #hud-overlay.visible {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="loading-overlay">
    <div class="two-moons">
      <div class="moon moon-1"></div>
      <div class="moon moon-2"></div>
    </div>
    <div class="loading-title">BAGONG LUPA</div>
    <div class="loading-subtitle">BAGONG BUHAY SA BAGONG MUNDO</div>
    <div class="loading-tagline">A New Life on a New World</div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Nag-iinitialize ang mundo...</div>
  </div>

  <div id="hud-overlay"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
